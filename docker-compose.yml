services:
  pingd:
    image: ghcr.io/saeid/pingd:latest
    ports:
      - "7685:7685"
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=changeme
      - PINGD_DATA_DIR=/data
      - PINGD_LOG_FORMAT=json
      - LOG_LEVEL=info
    volumes:
      - ./data:/data
    restart: unless-stopped
